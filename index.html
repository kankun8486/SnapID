<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">SnapID - Professional AI ID Photo Maker</title>
    <meta id="page-desc" name="description" content="SnapID helps you create international standard passport, ID, and visa photos using AI technology right on your phone.">

    <style>
        :root {
            --bg-color: #0F172A;
            --text-main: #FFFFFF;
            --accent-color: #38BDF8;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top, #1e293b, #020617);
            color: var(--text-main);
            text-align: center;
            line-height: 1.6;
        }

        .lang-selector {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
        }

        .lang-selector select {
            background-color: #020617;
            color: #ffffff;
            border: 1px solid rgba(56, 189, 248, 0.5);
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
        }

        .lang-selector select option {
            background-color: #ffffff;
            color: #000000;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 80px 20px;
        }

        .logo {
            width: 180px;
            height: 180px;
            object-fit: cover;
            border-radius: 40px;
            box-shadow: 0 15px 60px rgba(56, 189, 248, 0.7);
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #94a3b8;
            margin-bottom: 40px;
        }

        .btn-download {
            display: inline-block;
            background: linear-gradient(135deg, #38BDF8, #0ea5e9);
            color: #020617;
            padding: 16px 45px;
            font-size: 1.2rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 999px;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            margin-top: 60px;
        }

        .feature-box {
            background: rgba(255,255,255,0.05);
            padding: 25px;
            border-radius: 20px;
        }

        footer {
            margin-top: 80px;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        footer a {
            color: var(--accent-color);
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="lang-selector">
    <select id="langSwitcher" onchange="changeLanguage(this.value)">
        <option value="en">🇬🇧 English</option>
        <option value="vi">🇻🇳 Tiếng Việt</option>
        <option value="ja">🇯🇵 日本語</option>
        <option value="ko">🇰🇷 한국어</option>
    </select>
</div>

<div class="container">

    <img src="snapid_logo.png" class="logo">

    <h1>SnapID</h1>
    <p class="subtitle" id="subtitle"></p>

    <a href="https://play.google.com/store/apps/details?id=com.kankun.snapid"
       class="btn-download"
       id="btn_download"
       target="_blank">
    </a>

    <div class="features">
        <div class="feature-box">
            <h3 id="f1_title"></h3>
            <p id="f1_desc"></p>
        </div>

        <div class="feature-box">
            <h3 id="f2_title"></h3>
            <p id="f2_desc"></p>
        </div>

        <div class="feature-box">
            <h3 id="f3_title"></h3>
            <p id="f3_desc"></p>
        </div>
    </div>

    <footer>
        <p>© 2026 KANKUN DEV</p>
        <a href="privacy_policy.html" id="footer_privacy"></a> |
        <a href="mailto:email_cua_ban@gmail.com" id="footer_contact"></a>
    </footer>

</div>

<script>
const translations = {
    en: {
        subtitle: "Professional ID Photo Maker App",
        btn_download: "DOWNLOAD ON GOOGLE PLAY",
        f1_title: "✨ AI Background Cut",
        f1_desc: "Automatically remove background and replace with standard blue/white.",
        f2_title: "📏 Standard Sizes",
        f2_desc: "Supports passport and visa photo sizes for over 100 countries.",
        f3_title: "👔 Outfit Editing",
        f3_desc: "Customize outfits with simple zoom & move gestures.",
        footer_privacy: "Privacy Policy",
        footer_contact: "Contact"
    },
    vi: {
        subtitle: "Ứng dụng tạo ảnh thẻ chuyên nghiệp",
        btn_download: "TẢI TRÊN GOOGLE PLAY",
        f1_title: "✨ Xóa nền AI",
        f1_desc: "Tự động xóa nền và thay nền chuẩn.",
        f2_title: "📏 Kích thước chuẩn",
        f2_desc: "Hỗ trợ hơn 100 quốc gia.",
        f3_title: "👔 Chỉnh sửa trang phục",
        f3_desc: "Tùy chỉnh bằng thao tác kéo & zoom.",
        footer_privacy: "Chính sách",
        footer_contact: "Liên hệ"
    },
    ja: {
        subtitle: "プロ証明写真アプリ",
        btn_download: "Google Play でダウンロード",
        f1_title: "✨ 背景削除",
        f1_desc: "背景を自動削除。",
        f2_title: "📏 サイズ対応",
        f2_desc: "100カ国以上対応。",
        f3_title: "👔 服装調整",
        f3_desc: "ドラッグやズームで調整。",
        footer_privacy: "プライバシー",
        footer_contact: "お問い合わせ"
    },
    ko: {
        subtitle: "전문 증명사진 앱",
        btn_download: "Google Play 다운로드",
        f1_title: "✨ 배경 제거",
        f1_desc: "자동 배경 제거.",
        f2_title: "📏 사이즈 지원",
        f2_desc: "100개국 지원.",
        f3_title: "👔 의상 편집",
        f3_desc: "드래그와 확대/축소 조정.",
        footer_privacy: "개인정보",
        footer_contact: "문의"
    }
};

function setText(id, value){
    const el = document.getElementById(id);
    if(el) el.innerText = value;
}

function changeLanguage(lang){
    const t = translations[lang];

    setText("subtitle", t.subtitle);
    setText("btn_download", t.btn_download);
    setText("f1_title", t.f1_title);
    setText("f1_desc", t.f1_desc);
    setText("f2_title", t.f2_title);
    setText("f2_desc", t.f2_desc);
    setText("f3_title", t.f3_title);
    setText("f3_desc", t.f3_desc);
    setText("footer_privacy", t.footer_privacy);
    setText("footer_contact", t.footer_contact);

    localStorage.setItem("lang", lang);
}

window.onload = function(){
    const lang = localStorage.getItem("lang") || "en";
    document.getElementById("langSwitcher").value = lang;
    changeLanguage(lang);
}
</script>

</body>
</html>
