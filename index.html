<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title id="page-title">SnapID - Professional AI ID Photo Maker</title>
<meta id="page-desc" name="description" content="SnapID helps you create international standard passport, ID, and visa photos using AI technology right on your phone.">

<style>
:root {
    --bg-color: #0F172A;
    --text-main: #FFFFFF;
    --accent-color: #38BDF8;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #1e293b, #020617);
    color: var(--text-main);
    text-align: center;
}

/* LANGUAGE */
.lang-selector {
    position: fixed;
    top: 20px;
    right: 20px;
}

.lang-selector select {
    background: #020617;
    color: #fff;
    border-radius: 20px;
    padding: 8px 12px;
}

.lang-selector option {
    background: #fff;
    color: #000;
}

/* CONTAINER */
.container {
    max-width: 900px;
    margin: auto;
    padding: 80px 20px;
}

/* ✅ LOGO FIX CHUẨN */
.logo {
    width: 200px;
    height: 200px;
    object-fit: cover;          /* ép ảnh fill */
    border-radius: 32px;
    background: #0F172A;        /* nền để không bị hở */
    box-shadow: 0 20px 60px rgba(56,189,248,0.7);
}

/* TEXT */
h1 { font-size: 2.8rem; }

.subtitle {
    color: #94a3b8;
    margin-bottom: 30px;
}

/* BUTTON */
.btn-download {
    display: inline-block;
    background: linear-gradient(135deg, #38BDF8, #0ea5e9);
    color: #020617;
    padding: 15px 40px;
    border-radius: 999px;
    font-weight: bold;
    text-decoration: none;
}

/* FEATURES */
.features {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
    gap: 20px;
    margin-top: 50px;
}

.feature-box {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 20px;
}

footer {
    margin-top: 60px;
    color: #94a3b8;
}
</style>
</head>

<body>

<div class="lang-selector">
<select onchange="changeLanguage(this.value)" id="langSwitcher">
<option value="en">English</option>
<option value="vi">Tiếng Việt</option>
<option value="ja">日本語</option>
<option value="ko">한국어</option>
</select>
</div>

<div class="container">

<img src="snapid_logo.png" class="logo">

<h1>SnapID</h1>
<p id="subtitle">Professional ID Photo Maker App</p>

<a id="btn_download"
href="https://play.google.com/store/apps/details?id=com.kankun.snapid"
target="_blank"
class="btn-download">
DOWNLOAD
</a>

<div class="features">

<div class="feature-box">
<h3 id="f1_title"></h3>
<p id="f1_desc"></p>
</div>

<div class="feature-box">
<h3 id="f2_title"></h3>
<p id="f2_desc"></p>
</div>

<div class="feature-box">
<h3 id="f3_title"></h3>
<p id="f3_desc"></p>
</div>

</div>

<footer>
<p>© 2026 KANKUN DEV</p>
<a id="footer_privacy">Privacy Policy</a> |
<a id="footer_contact">Contact</a>
</footer>

</div>

<script>
const t = {
en:{
title:"SnapID - Professional AI ID Photo Maker",
desc:"SnapID helps you create passport photos with AI.",
subtitle:"Professional ID Photo Maker App",
download:"DOWNLOAD ON GOOGLE PLAY",
f1t:"✨ AI Background Cut",
f1d:"Remove background automatically",
f2t:"📏 Standard Sizes",
f2d:"100+ countries supported",
f3t:"👔 Smart Outfits",
f3d:"Add outfit with 1 tap",
privacy:"Privacy Policy",
contact:"Contact"
},
vi:{
title:"SnapID - Tạo ảnh thẻ AI",
desc:"Tạo ảnh hộ chiếu nhanh bằng AI",
subtitle:"Ứng dụng tạo ảnh thẻ chuyên nghiệp",
download:"TẢI NGAY",
f1t:"✨ Xóa nền AI",
f1d:"Tự động xóa nền",
f2t:"📏 Kích thước chuẩn",
f2d:"Hỗ trợ 100+ quốc gia",
f3t:"👔 Thay đồ thông minh",
f3d:"1 chạm đổi trang phục",
privacy:"Chính sách",
contact:"Liên hệ"
},
ja:{
title:"SnapID - 証明写真アプリ",
desc:"AIで証明写真を作成",
subtitle:"プロ証明写真アプリ",
download:"ダウンロード",
f1t:"✨ 背景削除",
f1d:"自動で背景を削除",
f2t:"📏 サイズ対応",
f2d:"100カ国対応",
f3t:"👔 服装変更",
f3d:"ワンタップで変更",
privacy:"プライバシー",
contact:"お問い合わせ"
},
ko:{
title:"SnapID - 증명사진 앱",
desc:"AI로 증명사진 생성",
subtitle:"전문 증명사진 앱",
download:"다운로드",
f1t:"✨ 배경 제거",
f1d:"자동 제거",
f2t:"📏 사이즈 지원",
f2d:"100개국 지원",
f3t:"👔 옷 변경",
f3d:"원터치 변경",
privacy:"개인정보",
contact:"문의"
}
};

function changeLanguage(lang){
let x=t[lang];

document.title=x.title;
document.getElementById("page-desc").content=x.desc;

subtitle.innerText=x.subtitle;
btn_download.innerText=x.download;

f1_title.innerText=x.f1t;
f1_desc.innerText=x.f1d;

f2_title.innerText=x.f2t;
f2_desc.innerText=x.f2d;

f3_title.innerText=x.f3t;
f3_desc.innerText=x.f3d;

footer_privacy.innerText=x.privacy;
footer_contact.innerText=x.contact;

localStorage.setItem("lang",lang);
}

window.onload=()=>{
let lang=localStorage.getItem("lang")||"en";
langSwitcher.value=lang;
changeLanguage(lang);
}
</script>

</body>
</html>
